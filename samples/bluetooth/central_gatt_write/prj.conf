CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_GATT_CLIENT=y

CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_CMD_TX_SIZE=255
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=255

# Maximum L2CAP size for one LL PDU size
CONFIG_BT_L2CAP_TX_MTU=247

# Auto initiated PHY update on connection established
CONFIG_BT_AUTO_PHY_UPDATE=y
# Enable user initiated PHY update support
# CONFIG_BT_USER_PHY_UPDATE=y

# Auto initiated Data Length update on connection established
CONFIG_BT_AUTO_DATA_LEN_UPDATE=y
# Enable user initiated Data Length update support
CONFIG_BT_USER_DATA_LEN_UPDATE=y

CONFIG_USE_VARIABLE_LENGTH_DATA=y
CONFIG_USE_FIXED_LENGTH_DATA=n
CONFIG_USE_FIXED_LENGTH_DATA_LEN=251

# Use link time optimization for code size reduction
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y
CONFIG_LTO=y

# Generate .lst file, to find HCI h/w error event given PC
CONFIG_OUTPUT_DISASSEMBLY=y
CONFIG_OUTPUT_DISASSEMBLY_WITH_SOURCE=y

CONFIG_BT_USE_DEBUG_KEYS=y

CONFIG_BT_CONN_PARAM_ANY=y

# CONFIG_ZERO_LATENCY_IRQS=y
# CONFIG_BT_CTLR_ZLI=y

CONFIG_BT_CTLR_ADVANCED_FEATURES=y
CONFIG_BT_CTLR_CONN_INTERVAL_LOW_LATENCY=y
# CONFIG_BT_CTLR_EVENT_IFS_LOW_LAT_US=52
CONFIG_BT_CTLR_TIFS_LOWEST=y

CONFIG_BT_CTLR_LLL_PRIO=0
CONFIG_BT_CTLR_ULL_HIGH_PRIO=1
CONFIG_BT_CTLR_ULL_LOW_PRIO=2

# CONFIG_BT_CTLR_LLL_PREPARE_AT_MARGIN=n

# CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# CONFIG_BT_CTLR_CONN_RSSI=y
# CONFIG_BT_CTLR_CONN_RSSI_EVENT=y

# Enable Extended Scanning
# CONFIG_BT_EXT_ADV=y
# CONFIG_BT_EXT_SCAN_BUF_SIZE=1650

# Zephyr Bluetooth LE Controller needs 16 event buffers to generate Extended
# Advertising Report for receiving the complete 1650 bytes of data
# CONFIG_BT_BUF_EVT_RX_COUNT=16

# Set maximum scan data length for Extended Scanning in Bluetooth LE Controller
# CONFIG_BT_CTLR_SCAN_DATA_LEN_MAX=1650

# Increase Zephyr Bluetooth LE Controller Rx buffer to receive complete chain
# of PDUs
# CONFIG_BT_CTLR_RX_BUFFERS=9

# CONFIG_BT_CTLR_PHY_CODED=y

# CONFIG_BT_CTLR_ADVANCED_FEATURES=y
# CONFIG_BT_CTLR_LOW_LAT_ULL=y
# CONFIG_BT_CTLR_SCAN_AUX_SET=9
# CONFIG_BT_CTLR_SCAN_UNRESERVED=y

# CONFIG_BT_CTLR_ADVANCED_FEATURES=y
# CONFIG_BT_CTLR_ASSERT_OVERHEAD_START=n

CONFIG_BT_CTLR_ASSERT_OPTIMIZE_FOR_SIZE=n
CONFIG_LOG=y
